  react: ^19.2.6
  react-dom: ^19.2.6
  "@trpc/client": ^11.17.0
  "@types/react": ^19.2.15
  "@types/react-dom": ^19.2.3
  "@prisma/client": ^7.8.0
  prisma: ^7.8.0
  ioredis: ^5.10.1
  lucide-react: ^1.16.0
  sonner: ^2.0.7
  tailwindcss: ^4.3.0
  remove-properties: ^2.1.1
minimumReleaseAgeExclude:
