changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-changelog
    authors:
      - dependabot
      - dependabot[bot]
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug fixes
      labels:
        - fix
        - bug
    - title: 📖 Documentation
      labels:
        - docs
        - documentation
    - title: 🧰 Maintenance
      labels:
        - chore
        - refactor
    - title: 🔒 Dependencies
      labels:
        - dependencies
    - title: Other changes
      labels:
        - "*"
