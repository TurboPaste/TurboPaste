name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Open or publish release PR
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v5
        with:
          # PAT used instead of GITHUB_TOKEN so the bot can open PRs even when
          # the "Allow GitHub Actions to create and approve pull requests" org
          # policy is off. Falls back to GITHUB_TOKEN if the secret is unset.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
