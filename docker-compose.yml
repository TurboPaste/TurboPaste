name: turbopaste

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: turbopaste
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d turbopaste"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/turbopaste
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-kZ0D2CHpOdwV4kbMzjTEFKQhJsx37Va5LpRuOtlfBJE=}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://127.0.0.1:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://127.0.0.1:3001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3001:80"
    environment:
      VITE_SERVER_URL: ${VITE_SERVER_URL:-http://127.0.0.1:3000}
      VITE_DOCS_URL: ${VITE_DOCS_URL:-http://127.0.0.1:4321}
    depends_on:
      - server
    restart: unless-stopped

  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
    ports:
      - "4321:80"
    restart: unless-stopped

volumes:
  postgres_data:
